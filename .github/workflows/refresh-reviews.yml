name: Refresh Google reviews

# The site is a static export, so the Google rating / review count is
# baked in at build time. This rebuilds the site once a day so those
# numbers stay current without any code changes. Can also be run on
# demand from the Actions tab ("Run workflow").

on:
  schedule:
    - cron: "0 11 * * *" # daily at 11:00 UTC (~3-4 AM Pacific, Victoria BC)
  workflow_dispatch: {}

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Cloudflare Pages deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "::error::CLOUDFLARE_DEPLOY_HOOK secret is not set. Add it in repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          curl -fsS -X POST "$DEPLOY_HOOK"
          echo "Triggered Cloudflare Pages rebuild."
